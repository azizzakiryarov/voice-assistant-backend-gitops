apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: voice-assistant-backend-ci-manual-
  namespace: voice-assistant-ci
spec:
  taskRunTemplate:
    serviceAccountName: voice-assistant-ci
  pipelineRef:
    name: voice-assistant-backend-ci
  params:
    - name: repo-url
      value: https://github.com/azizzakiryarov/voice-assistant-backend.git
    - name: revision
      value: main
    - name: image
      value: docker.io/azizzakiryarov/voice-assistant-backend
  workspaces:
    - name: source
      persistentVolumeClaim:
        claimName: voice-assistant-ci-source
    - name: cache
      persistentVolumeClaim:
        claimName: voice-assistant-ci-cache
