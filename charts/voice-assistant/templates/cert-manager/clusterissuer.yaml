{{- if .Values.certManager.clusterIssuer.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.clusterIssuer.name | quote }}
spec:
  acme:
    email: {{ .Values.certManager.clusterIssuer.email | quote }}
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: {{ printf "%s-account-key" .Values.certManager.clusterIssuer.name | quote }}
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
{{- end }}
