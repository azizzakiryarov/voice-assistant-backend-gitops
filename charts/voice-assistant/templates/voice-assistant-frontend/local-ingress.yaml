{{- if .Values.ingress.localHosts }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voice-assistant-local-ingress
  namespace: voice-assistant
  annotations:
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "1200"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "1200"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "1200"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
{{- range .Values.ingress.localHosts }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: voice-assistant-service-backend
                port:
                  number: 8081
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: voice-assistant-service-backend
                port:
                  number: 8081
          - path: /login/oauth2
            pathType: Prefix
            backend:
              service:
                name: voice-assistant-service-backend
                port:
                  number: 8081
          - path: /logout
            pathType: Prefix
            backend:
              service:
                name: voice-assistant-service-backend
                port:
                  number: 8081
          - path: /
            pathType: Prefix
            backend:
              service:
                name: voice-assistant-service-frontend
                port:
                  number: 80
{{- end }}
{{- end }}
