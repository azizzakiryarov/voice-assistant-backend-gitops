apiVersion: v1
kind: Namespace
metadata:
  name: voice-assistant
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-assistant-deployment-backend
  namespace: voice-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voice-assistant
      tier: backend
  template:
    metadata:
      labels:
        app: voice-assistant
        tier: backend
    spec:
      containers:
        - name: voice-assistant
          image: azizzakiryarov/voice-assistant-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              protocol: TCP
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-password
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-api-secret
                  key: ai-openai-api-key
            - name: GOOGLE_CALENDAR_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: google-calender-secret
                  key: client-id
            - name: GOOGLE_CALENDAR_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: google-calender-secret
                  key: client-secret
            - name: WHISPER_BASE_URL
              value: http://whisper:9000
            - name: APP_FRONTEND_URL
              value: {{ .Values.app.frontendUrl | quote }}
            - name: OLLAMA_KEEP_ALIVE
              value: "30m"
            - name: OLLAMA_NUM_CTX
              value: "4096"
            - name: OLLAMA_NUM_THREAD
              value: "4"
            - name: OLLAMA_NUM_PREDICT
              value: "2600"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: token-volume
              mountPath: /app/tokens
      volumes:
        - name: token-volume
          persistentVolumeClaim:
            claimName: tokens-pvc
